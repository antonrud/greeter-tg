plugins {
    id 'org.jetbrains.kotlin.jvm' version "$kotlin_version"
    id 'application'
}

application {
    mainClass.set('GreeterKt')
}

repositories {
    mavenCentral()
}

dependencies {
    implementation "dev.inmo:tgbotapi:$telegram_bot_api_version"
    runtimeOnly "org.slf4j:slf4j-simple:$slf4j_version"
}
